services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e_library_app
    restart: unless-stopped
    ports:
      - "8400:8400"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: e_library
      DB_USERNAME: e_library_user
      DB_PASSWORD: e_library_pass
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/public/build
      - storage_data:/var/www/html/storage

  mysql:
    image: mysql:8.0
    container_name: e_library_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: e_library
      MYSQL_USER: e_library_user
      MYSQL_PASSWORD: e_library_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  storage_data:
